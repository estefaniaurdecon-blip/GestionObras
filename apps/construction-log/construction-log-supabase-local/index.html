    <meta property="og:title" content="Sistema de Gestión de Obras | Gestión Profesional de Construcción" />

  <body>
    <div id="root">
      <!-- Fallback visible mientras carga JavaScript -->
      <div id="app-loading" style="
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1e3a5f;
        color: white;
        font-family: system-ui, sans-serif;
        z-index: 9999;
      ">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        <div style="font-size: 18px; font-weight: 600;">Partes de Trabajo y C.A. 2.0</div>
        <div style="margin-top: 8px; font-size: 12px; opacity: 0.7;">Sistema de Gestión de Obras</div>

        <div style="margin-top: 20px; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #F97316; border-radius: 50%; animation: spin 1s linear infinite;"></div>

        <div id="boot-status" style="margin-top: 14px; font-size: 12px; opacity: 0.85;">Inicializando…</div>
        <pre id="boot-log" style="margin-top: 10px; width: min(520px, 92vw); max-height: 28vh; overflow: auto; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 12px; font-size: 11px; line-height: 1.35; white-space: pre-wrap; word-break: break-word;"></pre>

        <div style="position: absolute; bottom: 24px; font-size: 11px; opacity: 0.5;">By Tony Bautista</div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    </div>
    <script type="module" src="./src/boot.ts"></script>
    <script>
      (function () {
        function setLoadingHTML(html) {
          var loading = document.getElementById("app-loading");
          if (!loading) return;
          loading.innerHTML = html;
        }

        function showBootError(title, detail) {
          setLoadingHTML(
            '<div style="text-align:center;padding:20px;max-width:320px;">' +
              '<div style="font-size:48px;margin-bottom:16px;">⚠️</div>' +
              '<div style="font-size:18px;font-weight:600;">' +
              title +
              "</div>" +
              '<div style="margin-top:10px;font-size:13px;opacity:0.85;word-break:break-word;">' +
              (detail || "") +
              "</div>" +
              '<button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#F97316;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Reintentar</button>' +
            "</div>"
          );
        }

        window.addEventListener("error", function (e) {
          var msg = e && e.message ? e.message : "Error desconocido";
          var src = e && e.filename ? "\n" + e.filename + ":" + (e.lineno || "") : "";
          showBootError("Error JavaScript al iniciar", msg + src);
        });

        window.addEventListener("unhandledrejection", function (e) {
          var reason = (e && e.reason) || "Promesa rechazada";
          var text = typeof reason === "string" ? reason : (reason && reason.message) ? reason.message : JSON.stringify(reason);
          showBootError("Error al iniciar (promesa)", text);
        });

        // Si después de 12s no ha montado React, mostrar aviso.
        setTimeout(function () {
          var loading = document.getElementById("app-loading");
          if (loading) {
            showBootError(
              "La app no terminó de cargar",
              "Si sigue igual, desinstala la app e instala de nuevo esta APK."
            );
          }
        }, 12000);
      })();
    </script>
  </body>
</html>
