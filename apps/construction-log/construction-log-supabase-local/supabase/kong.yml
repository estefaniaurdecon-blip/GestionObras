_format_version: "2.1"
_transform: true

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: true
        protocols: [http, https]

  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true
        protocols: [http, https]

  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1
        strip_path: true
        protocols: [http, https]

  - name: storage
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
        strip_path: true
        protocols: [http, https]

  - name: functions
    url: http://functions:9000
    routes:
      - name: functions-route
        paths:
          - /functions/v1
        strip_path: true
        protocols: [http, https]

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - apikey
        - Content-Type
        - x-supabase-api-version
        - accept-profile
        - content-profile
        - prefer
        - X-Client-Info
        - X-Client-Environment
        - X-Client-Version
        - X-Requested-With
        - X-Supabase-Client-Info
      exposed_headers:
        - Content-Range
        - Content-Type
      credentials: true
