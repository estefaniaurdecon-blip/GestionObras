apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

def azureBaseUrlDebug = (project.findProperty('AZURE_DOCINT_PROXY_URL_DEBUG') ?: System.getenv('AZURE_DOCINT_PROXY_URL_DEBUG') ?: project.findProperty('AZURE_DOCINT_PROXY_URL') ?: System.getenv('AZURE_DOCINT_PROXY_URL') ?: 'http://127.0.0.1:7071').toString()
def azureBaseUrlRelease = (project.findProperty('AZURE_DOCINT_PROXY_URL_RELEASE') ?: System.getenv('AZURE_DOCINT_PROXY_URL_RELEASE') ?: project.findProperty('AZURE_DOCINT_PROXY_URL') ?: System.getenv('AZURE_DOCINT_PROXY_URL') ?: 'http://127.0.0.1:7071').toString()
def azureBaseUrlDebugEscaped = azureBaseUrlDebug.replace("\\", "\\\\").replace("\"", "\\\"")
def azureBaseUrlReleaseEscaped = azureBaseUrlRelease.replace("\\", "\\\\").replace("\"", "\\\"")
def useAzureDocIntDebug = (
        project.findProperty('USE_DOCINT_DEBUG')
                ?: System.getenv('USE_DOCINT_DEBUG')
                ?: project.findProperty('USE_DOCINT')
                ?: System.getenv('USE_DOCINT')
                ?: project.findProperty('USE_AZURE_DOCINT_DEBUG')
                ?: System.getenv('USE_AZURE_DOCINT_DEBUG')
                ?: 'true'
).toString().toBoolean()
def useAzureDocIntRelease = (
        project.findProperty('USE_DOCINT_RELEASE')
                ?: System.getenv('USE_DOCINT_RELEASE')
                ?: project.findProperty('USE_DOCINT')
                ?: System.getenv('USE_DOCINT')
                ?: project.findProperty('USE_AZURE_DOCINT_RELEASE')
                ?: System.getenv('USE_AZURE_DOCINT_RELEASE')
                ?: 'true'
).toString().toBoolean()
def azureDocIntTimeoutMs = (project.findProperty('AZURE_DOCINT_TIMEOUT_MS') ?: System.getenv('AZURE_DOCINT_TIMEOUT_MS') ?: '60000').toString()

android {
    namespace "com.partesdetrabajo.app"
    compileSdk rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }
    defaultConfig {
        applicationId "com.partesdetrabajo.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            buildConfigField "boolean", "USE_DOCINT", useAzureDocIntDebug.toString()
            buildConfigField "boolean", "USE_AZURE_DOCINT", useAzureDocIntDebug.toString()
            buildConfigField "String", "AZURE_DOCINT_BASE_URL", "\"${azureBaseUrlDebugEscaped}\""
            buildConfigField "int", "AZURE_DOCINT_TIMEOUT_MS", azureDocIntTimeoutMs
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            buildConfigField "boolean", "USE_DOCINT", useAzureDocIntRelease.toString()
            buildConfigField "boolean", "USE_AZURE_DOCINT", useAzureDocIntRelease.toString()
            buildConfigField "String", "AZURE_DOCINT_BASE_URL", "\"${azureBaseUrlReleaseEscaped}\""
            buildConfigField "int", "AZURE_DOCINT_TIMEOUT_MS", azureDocIntTimeoutMs
        }
    }
    kotlinOptions {
        jvmTarget = "21"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.gms:play-services-mlkit-document-scanner:16.0.0-beta1"
    implementation "androidx.exifinterface:exifinterface:1.3.7"
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "com.squareup.retrofit2:retrofit:2.11.0"
    implementation "com.squareup.retrofit2:converter-gson:2.11.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
