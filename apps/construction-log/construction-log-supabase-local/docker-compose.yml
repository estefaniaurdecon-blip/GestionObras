services:
  db:
    image: supabase/postgres:15.1.0.117
    restart: unless-stopped
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/init/00_settings.sql:/docker-entrypoint-initdb.d/00_settings.sql:ro
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro

  kong:
    image: kong:3.4
    restart: unless-stopped
    depends_on:
      - auth
      - rest
      - realtime
      - storage
      - functions
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml:ro

  auth:
    image: supabase/gotrue:v2.187.0-rc.2
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
    environment:
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: "postgres"
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?search_path=auth,public
      GOTRUE_DB_SCHEMA: "auth"
      GOTRUE_DB_NAMESPACE: "auth"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_JWT_ADMIN_GROUP_NAME: "service_role"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    ports:
      - "9999:9999"

  rest:
    image: postgrest/postgrest:latest
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUC: "false"
    ports:
      - "3000:3000"

  realtime:
    image: supabase/realtime:latest
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
    environment:
      APP_NAME: "realtime"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      REPLICATION_MODE: "RLS"
    ports:
      - "4000:4000"

  storage:
    image: supabase/storage-api:latest
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
      - rest
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      STORAGE_BACKEND: "file"
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      FILE_SIZE_LIMIT: "52428800"
    volumes:
      - storage_data:/var/lib/storage
    ports:
      - "5000:5000"

  functions:
    image: denoland/deno:1.43.6
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 9000
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    command: ["deno", "run", "-A", "/home/deno/functions/main.ts"]
    ports:
      - "9000:9000"

  meta:
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
    environment:
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: ${POSTGRES_USER}
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8081:8080"

  studio:
    image: supabase/studio:latest
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - meta
      - kong
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      STUDIO_PG_META_URL: http://meta:8080
    ports:
      - "54323:3000"

  imgproxy:
    image: darthsim/imgproxy:latest
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/"
      IMGPROXY_USE_ETAG: "true"
    ports:
      - "5001:8080"

  app:
    image: node:20
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      VITE_SUPABASE_URL: http://localhost:8000
      VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 8080"]
    ports:
      - "8080:8080"

volumes:
  db_data:
  storage_data:
  node_modules:
