name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Verificar ubicación del runner
        run: pwd

      - name: Actualizar código del proyecto
        run: |
          cd /home/server/projects/erp
          git pull origin main

      - name: Tirar instancia actual de Docker
        run: |
          cd /home/server/projects/erp/infra
          docker compose down -v

      - name: Levantar Docker Compose (staging)
        run: |
          cd /home/server/projects/erp/infra
          docker compose -f docker-compose.staging.yml up -d --build

      - name: Ejecutar seed RBAC
        run: |
          cd /home/server/projects/erp/infra
          docker exec saas-backend-fastapi python -m app.core.seed_rbac
