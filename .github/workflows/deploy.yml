name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Actualizar código del proyecto (clean)
        run: |
          cd /home/server/projects/erp
          git fetch origin main
          git reset --hard origin/main
          git clean -fd -e infra/data/logos/

      - name: Tirar instancia actual de Docker
        run: |
          cd /home/server/projects/erp/infra
          docker compose down

      - name: Levantar Docker Compose (staging)
        run: |
          cd /home/server/projects/erp/infra
          docker compose -f docker-compose.yml up -d --build

      - name: Esperar a que PostgreSQL esté listo
        run: |
          cd /home/server/projects/erp/infra
          echo "Esperando a que la base de datos PostgreSQL esté lista..."
          until docker exec saas-db pg_isready -U postgres; do
            sleep 2
          done
          echo "PostgreSQL listo"

      - name: Ejecutar seed RBAC
        run: |
          cd /home/server/projects/erp/infra
          docker exec saas-backend-fastapi python -m app.core.seed_rbac
