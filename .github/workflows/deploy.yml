name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Verificar ubicación del runner
        run: pwd

      - name: Actualizar código del proyecto
        run: |
          cd /home/server/projects/erp
          git pull origin main

      - name: Levantar Docker Compose
        run: |
          cd /home/server/projects/erp/infra
          docker compose up -d --build
