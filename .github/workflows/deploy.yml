name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Debug inicial: verificar que los secrets se pasan correctamente
      - name: Debug SSH Info
        run: |
          echo "SSH_HOST=${{ secrets.SSH_HOST }}"
          echo "SSH_USER=${{ secrets.SSH_USER }}"
          echo "DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}"
          echo "DOCKER_COMPOSE_FILE=${{ secrets.DOCKER_COMPOSE_FILE }}"

      # Deploy usando SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22  # cambia si usas otro puerto
          script: |
            # Entrar a la carpeta del proyecto con docker-compose
            cd ${{ secrets.DEPLOY_PATH }}

            # Actualizar código desde Git
            git pull origin main

            # Levantar contenedores en modo detached y reconstruir
            docker compose up -d --build
