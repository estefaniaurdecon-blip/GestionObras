name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  validate_frontend_react:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend-react
        run: npm run build

      - name: Run frontend-react tests
        run: npm run test -- --run

  deploy:
    needs: validate_frontend_react
    runs-on: self-hosted

    steps:
      - name: Actualizar código del proyecto (clean)
        run: |
          cd /home/server/projects/erp
          git fetch origin main
          git reset --hard origin/main
          git clean -fd -e infra/data/logos/

      - name: Tirar instancia actual de Docker
        run: |
          cd /home/server/projects/erp/infra
          docker compose down

      - name: Levantar Docker Compose (staging)
        run: |
          cd /home/server/projects/erp/infra
          docker compose -f docker-compose.yml up -d --build

      - name: Esperar a que PostgreSQL esté listo
        run: |
          cd /home/server/projects/erp/infra
          echo "Esperando a que la base de datos PostgreSQL esté lista..."
          until docker exec saas-db pg_isready -U postgres; do
            sleep 2
          done
          echo "PostgreSQL listo"

      - name: Ejecutar seed RBAC
        run: |
          cd /home/server/projects/erp/infra
          docker exec saas-backend-fastapi python -m app.core.seed_rbac
