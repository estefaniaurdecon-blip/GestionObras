version: "3.9"

services:
  db:
    image: postgres:16
    container_name: saas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Madrid
    # Para desarrollo local; si ya tienes un PostgreSQL en 5432,
    # usamos 5433 en el host para evitar conflictos.
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Base de datos dedicada para Moodle (MySQL 5.x).
  moodle-db:
    image: mysql:5
    container_name: saas-moodle-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=moodle
      - MYSQL_ROOT_PASSWORD=moodle
      - MYSQL_USER=moodle
      - MYSQL_PASSWORD=moodle
      - TZ=Europe/Madrid
    volumes:
      - moodle_db_data:/var/lib/mysql

  # Instancia de Moodle accesible desde la plataforma (ej. moodle.mavico.shop).
  # Usa la imagen jhardison/moodle con una base de datos externa (moodle-db).
  moodle:
    image: jhardison/moodle:latest
    container_name: saas-moodle
    restart: unless-stopped
    depends_on:
      - moodle-db
    # Alias "DB" para que el contenedor Moodle encuentre la base de datos
    # tal y como espera la imagen (equivalente a --link DB:DB).
    links:
      - moodle-db:DB
    environment:
      # URL publica prevista para el sitio Moodle.
      - MOODLE_URL=${MOODLE_URL}
      # Estamos detras de Cloudflare (reverse proxy SSL).
      - SSL_PROXY=false
      - TZ=Europe/Madrid
      # Variables que espera el config.php de esta imagen (simulando el antiguo
      # mecanismo de Docker links) para localizar la base de datos MySQL.
      - DB_PORT_3306_TCP_ADDR=moodle-db
      - DB_PORT_3306_TCP_PORT=3306
      - DB_ENV_MYSQL_DATABASE=moodle
      - DB_ENV_MYSQL_USER=moodle
      - DB_ENV_MYSQL_PASSWORD=moodle
    ports:
      # Acceso local de desarrollo: http://<host>:8080
      - "8080:80"

  backend-fastapi:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-backend-fastapi
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://192.168.1.171:11434
      INVOICES_STORAGE_PATH: /data/invoices
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./data/invoices:/data/invoices

  celery-worker:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-celery-worker
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://192.168.1.171:11434
      INVOICES_STORAGE_PATH: /data/invoices
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=INFO"]
    volumes:
      - ./data/invoices:/data/invoices

  celery-beat:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-celery-beat
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://192.168.1.171:11434
      INVOICES_STORAGE_PATH: /data/invoices
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "beat", "--loglevel=INFO"]
    volumes:
      - ./data/invoices:/data/invoices

  frontend-react:
    build:
      context: ../frontend-react
      dockerfile: Dockerfile
    container_name: saas-frontend-react
    restart: unless-stopped
    environment:
      # En desarrollo usamos proxy de Vite para evitar problemas de CORS/localhost.
      VITE_API_BASE_URL: relative
      VITE_API_PROXY_TARGET: http://backend-fastapi:8000
      TZ: Europe/Madrid
    depends_on:
      - backend-fastapi
    ports:
      - "5173:5173"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: saas-cloudflared
    restart: unless-stopped
    # Arranca el tunel configurado con el token de Cloudflare.
    command: tunnel run plataforma-dev-saas
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TZ=Europe/Madrid

volumes:
  db_data:
  moodle_db_data:
