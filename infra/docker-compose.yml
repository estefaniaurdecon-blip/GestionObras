version: "3.9"
# alex no haces nada
services:
  db:
    image: postgres:16
    container_name: saas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Madrid
    # Para desarrollo local; si ya tienes un PostgreSQL en 5432,
    # usamos 5433 en el host para evitar conflictos.
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: saas-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    environment:
      TZ: Europe/Madrid
    volumes:
      - ollama_data:/root/.ollama

  backend-fastapi:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-backend-fastapi
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AI_HELP_LLM_ENABLED: ${AI_HELP_LLM_ENABLED:-false}
      OLLAMA_HELP_MODEL: ${OLLAMA_HELP_MODEL:-qwen2.5:3b}
      INVOICES_STORAGE_PATH: /data/invoices
      CONTRACTS_STORAGE_PATH: /data/contracts
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data/invoices:/data/invoices
      - ./data/contracts:/data/contracts
      - ./data/logos:/app/data/logos
      - ./data/avatars:/app/data/avatars
      - ./data/project-docs:/app/data/project-docs

  celery-worker:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-celery-worker
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HELP_MODEL: ${OLLAMA_HELP_MODEL:-qwen2.5:3b}
      INVOICES_STORAGE_PATH: /data/invoices
      CONTRACTS_STORAGE_PATH: /data/contracts
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
      ]
    volumes:
      - ./data/invoices:/data/invoices
      - ./data/contracts:/data/contracts

  celery-beat:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-celery-beat
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HELP_MODEL: ${OLLAMA_HELP_MODEL:-qwen2.5:3b}
      INVOICES_STORAGE_PATH: /data/invoices
      CONTRACTS_STORAGE_PATH: /data/contracts
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "beat",
        "--loglevel=INFO",
      ]
    volumes:
      - ./data/invoices:/data/invoices
      - ./data/contracts:/data/contracts

volumes:
  db_data:
  ollama_data:
