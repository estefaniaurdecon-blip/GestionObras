version: "3.9"
# alex no haces nada
services:
  db:
    image: postgres:16
    container_name: saas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Madrid
    # Para desarrollo local; si ya tienes un PostgreSQL en 5432,
    # usamos 5433 en el host para evitar conflictos.
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend-fastapi:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-backend-fastapi
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://192.168.1.171:11434
      INVOICES_STORAGE_PATH: /data/invoices
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./data/invoices:/data/invoices
      - ./data/logos:/app/data/logos
      - ./data/avatars:/app/data/avatars
      - ./data/project-docs:/app/data/project-docs

  celery-worker:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-celery-worker
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://192.168.1.171:11434
      INVOICES_STORAGE_PATH: /data/invoices
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
      ]
    volumes:
      - ./data/invoices:/data/invoices

  celery-beat:
    build:
      context: ../backend-fastapi
      dockerfile: Dockerfile
    container_name: saas-celery-beat
    restart: unless-stopped
    env_file:
      - ../backend-fastapi/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/saas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://192.168.1.171:11434
      INVOICES_STORAGE_PATH: /data/invoices
      TZ: Europe/Madrid
    depends_on:
      - db
      - redis
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "beat",
        "--loglevel=INFO",
      ]
    volumes:
      - ./data/invoices:/data/invoices

  frontend-react:
    build:
      context: ../frontend-react
      dockerfile: Dockerfile
    container_name: saas-frontend-react
    restart: unless-stopped
    environment:
      # En desarrollo usamos proxy de Vite para evitar problemas de CORS/localhost.
      VITE_API_BASE_URL: relative
      VITE_API_PROXY_TARGET: http://backend-fastapi:8000
      TZ: Europe/Madrid
    depends_on:
      - backend-fastapi
    ports:
      - "5173:5173"

volumes:
  db_data:
  moodle_db_data:
